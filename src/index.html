<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Taller de Patrones de Diseño - Angular</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e293b" />

    <style>
      /* Reset y estilos globales */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        color: #e2e8f0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      app-root {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Loading screen */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #06b6d4;
        font-size: 1.5em;
      }

      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(6, 182, 212, 0.3);
        border-top-color: #06b6d4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 15px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <app-root>
      <div class="loading">
        <div class="spinner"></div>
        Cargando taller de patrones...
      </div>
    </app-root>
  </body>
</html>
